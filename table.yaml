/**
 * Tek bir maç için tüm Mackolik verilerini çek ve Supabase'e yaz
 */
async function processMatch(mapping) {
    const { api_fixture_id, mackolik_match_id, home_team_id, away_team_id,
            home_team_name, away_team_name, home_team_logo, away_team_logo,
            league_id } = mapping;

    console.log(`\n⚽ İşleniyor: ${home_team_name} vs ${away_team_name}`);
    console.log(`   API-Football: ${api_fixture_id} | Mackolik: ${mackolik_match_id}`);

    const matchInfo = {
        homeTeamId: home_team_id,
        awayTeamId: away_team_id,
        homeTeamName: home_team_name,
        awayTeamName: away_team_name,
        homeTeamLogo: home_team_logo,
        awayTeamLogo: away_team_logo,
    };

    try {
        // 1. Details (events + lineups) - Mackolik JSON endpoint
        const details = await fetchMatchDetails(mackolik_match_id);

        if (details) {
            // Events
            const events = transformEvents(details, api_fixture_id, matchInfo);
            await writeEvents(api_fixture_id, events);

            // Lineups
            const lineupsData = transformLineups(details, api_fixture_id, matchInfo);
            await writeLineups(api_fixture_id, lineupsData);
        }

        await sleep(400 + Math.random() * 400);

        // 2. Statistics - Mackolik HTML endpoint
        const statsHtml = await fetchMatchStats(mackolik_match_id);
        const statsData = transformStatistics(statsHtml, api_fixture_id, matchInfo);
        await writeStatistics(api_fixture_id, statsData);

        await sleep(400 + Math.random() * 400);

        // 3. H2H
        const h2hHtml = await fetchMatchH2H(mackolik_match_id);
        const h2hData = transformH2H(h2hHtml, matchInfo);
        const h2hKey = `${home_team_id}-${away_team_id}`;
        await writeH2H(h2hKey, h2hData);

        await sleep(400 + Math.random() * 400);

        // 4. Standings
        const standingsHtml = await fetchMatchStandings(mackolik_match_id);
        const standingsData = transformStandings(standingsHtml);
        await writeStandings(league_id, standingsData);

        console.log(`   ✅ Tamamlandı: ${home_team_name} vs ${away_team_name}`);

    } catch (err) {
        console.error(`   ❌ Hata: ${err.message}`);
    }
}

/**
 * Canlı maçları bul ve işle
 */
async function processLiveMatches() {
    console.log('🚀 ScorePop Mackolik Live Worker başlatıldı');
    console.log(`⏰ ${new Date().toISOString()}\n`);

    // 1. Canlı maçları al (live_matches tablosundan)
    //    Koyeb worker zaten API-Football'dan bu tabloya yazıyor
    //    Biz sadece canlı olanları alıp Mackolik ID'si ile eşleştiriyoruz
    const { data: liveMatches, error: liveErr } = await supabase
        .from('live_matches')
        .select('*')
        .in('match_status', ['1H', '2H', 'HT', 'ET', 'PEN', 'LIVE', 'NS']);

    if (liveErr) {
        console.error('❌ live_matches çekme hatası:', liveErr.message);
        return;
    }

    if (!liveMatches || liveMatches.length === 0) {
        console.log('📭 Canlı maç yok, çıkılıyor.');
        return;
    }

    console.log(`📋 ${liveMatches.length} canlı maç bulundu`);

    // 2. match_id_mapping tablosundan eşleşmeleri al
    const fixtureIds = liveMatches.map(m => String(m.fixture_id));
    const { data: mappings, error: mapErr } = await supabase
        .from('match_id_mapping')
        .select('*')
        .in('api_fixture_id', fixtureIds)
        .not('mackolik_match_id', 'is', null);

    if (mapErr) {
        console.error('❌ match_id_mapping çekme hatası:', mapErr.message);
        return;
    }

    if (!mappings || mappings.length === 0) {
        console.log('⚠️  Eşleşmiş Mackolik ID bulunamadı');
        console.log('   Önce ID eşleştirme yapılmalı (match_id_mapping tablosu)');
        return;
    }

    console.log(`🔗 ${mappings.length}/${liveMatches.length} maçın Mackolik ID'si mevcut`);

    // 3. Her eşleşmiş maç için Mackolik verisini çek ve yaz
    // matchInfo bilgilerini live_matches'tan al
    for (const mapping of mappings) {
        const liveMatch = liveMatches.find(m => String(m.fixture_id) === String(mapping.api_fixture_id));

        const enrichedMapping = {
            ...mapping,
            home_team_id: liveMatch?.home_team_id || mapping.home_team_id,
            away_team_id: liveMatch?.away_team_id || mapping.away_team_id,
            home_team_name: liveMatch?.home_team_name || mapping.home_team_name || 'Home',
            away_team_name: liveMatch?.away_team_name || mapping.away_team_name || 'Away',
            home_team_logo: liveMatch?.home_team_logo || null,
            away_team_logo: liveMatch?.away_team_logo || null,
            league_id: liveMatch?.league_id || mapping.league_id,
        };

        await processMatch(enrichedMapping);
        await sleep(800 + Math.random() * 600);
    }

    console.log(`\n🏁 Tamamlandı. ${mappings.length} maç işlendi.`);
}

/**
 * Test modu: Tek bir fixture için test et
 */
async function testSingleFixture(apiFixtureId) {
    console.log(`🧪 TEST MODU: fixture ${apiFixtureId}`);

    const { data: mapping } = await supabase
        .from('match_id_mapping')
        .select('*')
        .eq('api_fixture_id', String(apiFixtureId))
        .single();

    if (!mapping || !mapping.mackolik_match_id) {
        console.log('❌ Bu fixture için Mackolik eşleşmesi yok');
        console.log('   match_id_mapping tablosuna ekleyin');
        return;
    }

    // live_matches'tan takım bilgilerini çek
    const { data: liveMatch } = await supabase
        .from('live_matches')
        .select('*')
        .eq('fixture_id', String(apiFixtureId))
        .single();

    const enrichedMapping = {
        ...mapping,
        home_team_id: liveMatch?.home_team_id || null,
        away_team_id: liveMatch?.away_team_id || null,
        home_team_name: liveMatch?.home_team_name || 'Home',
        away_team_name: liveMatch?.away_team_name || 'Away',
        home_team_logo: liveMatch?.home_team_logo || null,
        away_team_logo: liveMatch?.away_team_logo || null,
        league_id: liveMatch?.league_id || null,
    };

    await processMatch(enrichedMapping);
}

// ─── ENTRY POINT ────────────────────────────────────────────────────────────
(async () => {
    try {
        if (!SUPABASE_URL || !SUPABASE_KEY) {
            console.error('❌ SUPABASE_URL ve SUPABASE_SERVICE_ROLE_KEY gerekli');
            process.exit(1);
        }

        if (SINGLE_FIXTURE) {
            await testSingleFixture(SINGLE_FIXTURE);
        } else {
            await processLiveMatches();
        }
    } catch (err) {
        console.error('💥 Kritik hata:', err);
        process.exit(1);
    }
    process.exit(0);
})();
